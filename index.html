<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Template</title>
    <link rel="icon" type="image/png" href="./Asset/Icon_digala.png">
    <link rel="stylesheet" href="./src/output.css">
    <script src="./node_modules/preline/dist/preline.js"></script>

    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Bonheur+Royale&family=Lexend&family=Montserrat:wght@400;500;700&display=swap">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

</head>

<body class="overflow-hidden scroll-smooth">
    <!-- Pembuka -->
    <section class="bg-gradient-to-b from-[#8D1F22] from-0% via-[#300A17] via-70% to-black to-94%" id="landing">
        <div class=" hero min-h-screen relative " style="background-image: url(./Asset/Kartu\ Undangan.png);  
        background-size: cover;  
        background-position: bottom center;  
        background-repeat: no-repeat;">
            <div class="hero-content text-neutral-content text-center  w-full ">
                <div class="max-w-md w-full flex flex-col items-center">
                    <h1 class="text-8xl font-bonheur text-white drop-shadow-[0_0_10px_rgba(255,255,255,0.8)]">Undangan
                    </h1>
                    <h1
                        class="ml-16 -mt-6 text-8xl font-bonheur text-white drop-shadow-[0_0_10px_rgba(255,255,255,0.8)]">
                        Ulang Tahun</h1>
                    <p class="text-lg mt-5 font-lexend text-white">selasa, 28 April 2026</p>
                    <h4 class="font-lexend mt-2 text-white"> Kepada <br> <span id="guest-name"
                            class="font-lexend font-semibold text-white drop-shadow-[0_0_10px_rgba(255,255,255,0.8)]"></span>
                    </h4>
                    <button id="openBtn"
                        class="mt-5 flex font-lexend items-center justify-center gap-2 rounded-full bg-[#1B0615] bg-opacity-60 px-6 py-3 text-center text-sm text-white ring-1 ring-white focus:outline-none active:text-brown">
                        <span class="text-white drop-shadow-[0_0_10px_rgba(255,255,255,0.8)]">Buka Undangan</span>
                    </button>
                </div>
            </div>
            <div class="absolute bottom-[-1px] left-0 w-full">
                <img src="Asset/batasan.png" alt="batasan" class="w-full block p-0 m-0">
            </div>
        </div>
    </section>
    <!-- Pembuka End -->

    <!-- Section Nama -->
    <section class="bg-[#E2E2E2]" id="nextSection">
        <div class="container mx-auto px-4 py-12 flex flex-col items-center overflow-hidden">
            <div class="relative">
                <img src="Asset/vector/bunga bg.svg"
                    class="md:scale-x-125 absolute top-10 md:top-20  left-1/2 -translate-x-1/2 w-[343px] h-[487px] md:w-[592px] md:h-[837px]">
                <div class="relative z-10">
                    <div class="mt-10">
                        <h1 class="text-[48px] md:text-[96px] text-center font-bonheur text-[#300A17] font-normal" data-aos="zoom-in">
                            Om
                            Swastyastu
                        </h1>
                        <p class="mt-3 text-[12px] md:text-[16px] text-center font-lexend text-[#313131] font-normal" data-aos="zoom-in">
                            Halo Ayah/Bunda Kelas 2 D, semoga sehat selalu ya! 😊   
                            Kami ingin mengundang Anak - Anak  untuk ikut hadir memeriahkan acara ulang tahun ke-8 anak kami, Beni Satria Pukul 12:00 Wita 28 April 2026</p>
                    </div>

                    <!-- Nama Yang Metatah -->
                    <div class="mt-9 px-4" data-aos="fade-up" data-aos-delay="500">
                         <img src="Asset/eben.jpg" alt="Foto Anak dan Capybara" class="w-full h-[200px] object-cover object-center rounded-lg shadow-md">
                    </div>
                    <!-- End Nama -->

                    <!-- Orang Tua -->
                    <div class="mt-10 flex flex-col items-center" data-aos="fade-up" data-aos-delay="500">
                        <p class="text-[16px] text-center font-lexend text-[#313131] font-normal">
                        </p>
                        <p class="mt-4 text-[16px] text-center font-lexend text-[#313131] font-bold"></p>

                        <!-- Image container -->
                        <div class="mt-2 w-[103px] md:w-[130px]">
                            <img src="Asset/vector/bunga kecil.svg" class="w-full h-auto">
                        </div>
                    </div>
                    <!-- orang tua end -->
                </div>
            </div>
        </div>
        <div class="relative mt-4">
            <!-- Gambar untuk Mobile -->
            <div class="absolute  bottom-[-1px] left-0 w-full block md:hidden">
                <img src="Asset/batasan_merah.png" alt="batasan" class="w-full overflow-hidden">
            </div>
            <!-- Gambar untuk Desktop -->
            <div class="absolute bottom-[-1px] left-0 w-full md:block z-0">
                <img src="Asset/merah.png" alt="merah" class="w-full overflow-hidden">
            </div>
        </div>
    </section>
    <!-- Section Nama End -->
    <!-- Music Icon -->
    <div class="fixed bottom-4 right-4">
        <button id="music-icon" class="p-4 bg-transparent rounded-full shadow-lg focus:outline-none"
            aria-label="Toggle Music">
            <svg id="music-icon-svg" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none"
                viewBox="0 0 24 24" stroke="currentColor">
                <path id="music-on" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M9 19V6l12-2v13m-6 5a3 3 0 110-6 3 3 0 010 6zm-6 0a3 3 0 110-6 3 3 0 010 6z" />
                <path id="music-off" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M6 18L18 6M6 6l12 12" class="hidden" />
            </svg>
        </button>
    </div>

    <!-- Audio Element -->
    <audio id="background-music" loop>
        <source src="./audio/One Piece - Memories AMV.mp3" type="audio/mpeg">
    </audio>

    <script src="./src/countdown.js"></script>
    <script src="./src/music.js"></script>
    <script src="./src/tamu_Undangan.js"></script>
    <script src="./src/data.js"></script>
    <script src="./src/tanggal.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

    <script>
        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.body.style.backgroundColor = "#ffffff";
            document.body.style.color = "#000000";
        }

        // Animasi
        AOS.init({
            once: true, // Animasi hanya berjalan sekali
            duration: 1000, // Durasi animasi dalam milidetik
            easing: 'ease-in-out', // Gerakan animasi lebih halus
        });

    </script>

</body>

</html>
